
- name: Validate kubeconfig file for local machine
  delegate_to: localhost
  block:
    - name: Check if file already exists
      ansible.builtin.stat:
        path: '{{ K8S_CONFIG }}'
      register: config_check

    - name: Fail if file already exists
      ansible.builtin.fail:
        msg: Kubeconfig file {{ K8S_CONFIG }} already exists
      when: config_check.stat.isreg is defined and config_check.stat.isreg

- name: Prepare K3S installation variables
  block:
    - name: Create K3S installation variables dictionary
      ansible.builtin.set_fact:
        K3S_INSTALLATION_VARS: {}
        K3S_DISABLE: ''

    - name: Add all user-defined variables to dictionary
      ansible.builtin.set_fact:
        K3S_INSTALLATION_VARS: '{{ K3S_INSTALLATION_VARS | combine({ "INSTALL_K3S_" + k3s_var.key: k3s_var.value  }) }}'
      loop: '{{ K3S.INSTALL | dict2items }}'
      loop_control:
        loop_var: k3s_var

    - name: Create parameters for disabling components
      ansible.builtin.set_fact:
        K3S_DISABLE: '{{ K3S_DISABLE }} --disable={{ disable_item }}'
      loop: '{{ K3S_DISABLE_ITEMS }}'
      loop_control:
        loop_var: disable_item

