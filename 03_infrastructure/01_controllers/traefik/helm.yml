---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
spec:
  interval: 30m
  url: oci://ghcr.io/traefik/helm
  type: oci
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: traefik
      version: 41.0.0
      sourceRef:
        kind: HelmRepository
        name: traefik
      interval: 30m
  releaseName: traefik
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true
  valuesFrom:
    - kind: ConfigMap
      name: traefik-helm-values
      valuesKey: values.yml
  driftDetection:
    mode: enabled
    ignore:
    - paths: ["/spec/replicas"]
      target:
        kind: Deployment