K8S_CONFIG: '{{ inv_k8s.kubeconfig }}' # Where kubeconfig file will be generated on localhost
K8S_CONTEXT: '{{ inv_k8s.context }}'

ANSIBLE_NO_LOG: false

# https://docs.k3s.io/reference/env-variables
## All variables will be appended, do not include `INSTALL_K3S` in var key
K3S:
  INSTALL:
    VERSION: v1.35.2+k3s1
    CHANNEL: stable
  FLANNEL_BACKEND: host-gw # # One of 'none', 'vxlan', 'ipsec'(deprecated), 'host-gw', 'wireguard-native', or 'wireguard'(deprecated)

# List of components to disable
K3S_DISABLE_ITEMS:
  - traefik