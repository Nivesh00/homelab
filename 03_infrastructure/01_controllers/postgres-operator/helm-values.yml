apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-operator-helm-values
  namespace: ${ENVIRONMENT}-${ns_operation}
data:
  values.yml: |-
    image:
      registry: ghcr.io
      repository: zalando/postgres-operator
      tag: v1.15.1
      pullPolicy: "IfNotPresent"

    configGeneral:
      enable_crd_registration: true
      crd_categories:
        - "all"

      docker_image: ghcr.io/zalando/spilo-17:4.0-p3

      min_instances: -1
      max_instances: -1
      repair_period: 5m
      resync_period: 30m
      workers: 8

    configUsers:
      additional_owner_roles:
        - admin

      enable_password_rotation: false
      password_rotation_interval: 90
      password_rotation_user_retention: 180
      replication_username: standby
      super_username: postgres

    configKubernetes:
      cluster_domain: cluster.local
      cluster_labels:
        application: spilo
      cluster_name_label: cluster-name
      # additional annotations to add to every database pod
      # custom_pod_annotations:
      #   keya: valuea
      #   keyb: valueb
      persistent_volume_claim_retention_policy:
        when_deleted: "retain"
        when_scaled: "retain"

    configPostgresPodResources:
      default_cpu_limit: 100m
      default_cpu_request: 50m
      default_memory_limit: 100Mi
      default_memory_request: 50Mi
      max_cpu_request: 200m
      max_memory_request: 200Mi
      min_cpu_limit: 25m
      min_memory_limit: 25Mi

    resources:
      limits:
        cpu: 100m
        memory: 100Mi
      requests:
        cpu: 50m
        memory: 50Mi
