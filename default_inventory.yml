all:
  vars:
    ENVIRONMENT: # e.g. dev, stg, prd
  
  children:
    servers:
      hosts:
        main_server:
          ansible_host: <remote-ip>
          ansible_user: <remote-user>
          ansible_ssh_private_key_file: /path/to/ssh/file
          ansible_python_interpreter: /usr/bin/python3

        localhost:
          ansible_host: 127.0.0.1
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3

      # Following variables are not needed for K3S Installation
      # Only needed for platform deployment
      vars:
        inv_k8s:
          # kubeconfig filename at path ~/.kube
          kubeconfig: master_config # Master config
