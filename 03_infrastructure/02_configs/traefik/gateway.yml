---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  annotations:
    cert-manager.io/issuer: letsencrypt-production
spec:
  gatewayClassName: traefik

  listeners:
    - name: http-default
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All 

    - name: monitoring-grafana
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: secret-tls
            namespace: monitoring-stack

      allowedRoutes:
        namespaces:
          from: All
