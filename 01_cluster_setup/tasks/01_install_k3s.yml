- name: Install K3S
  ansible.builtin.shell: >-
    curl -sfL https://get.k3s.io | sh -s - --flannel-backend={{ K3S.FLANNEL_BACKEND }} {{ K3S_DISABLE }}
  register: debug_msg
  environment: '{{ K3S_INSTALLATION_VARS }}'
