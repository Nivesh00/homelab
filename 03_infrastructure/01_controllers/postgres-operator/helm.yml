---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: postgres-operator
spec:
  interval: 30m
  url: https://opensource.zalando.com/postgres-operator/charts/postgres-operator
  type: default
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres-operator
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: postgres-operator
      version: v1.15.1
      sourceRef:
        kind: HelmRepository
        name: postgres-operator
      interval: 30m
  releaseName: postgres-operator
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true
  valuesFrom:
    - kind: ConfigMap
      name: postgres-operator-helm-values
      valuesKey: values.yml
  driftDetection:
    mode: enabled
