all:
  vars:
    ENVIRONMENT: stg # e.g. dev, stg, prd

  children:
    servers:
      hosts:
        main_server:
          ansible_host: <ip-remote>
          ansible_user: root
          ansible_ssh_private_key_file: /path/to/ssh/key
          ansible_python_interpreter: /usr/bin/python3

        localhost:
          ansible_host: 127.0.0.1
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3

      vars:
        # Kubernetes specific
        inv_k8s:
          kubeconfig: master_config_test # kubeconfig filename at path ~/.kube
          context: homelab-admin@homelab # user and cluster name, seperated by an '@'

        inv_flux:
          enable: true
          # GitHub personal access token with repo permissions
          github:
            user:
            token:

      # Following variables are not needed for K3S Installation
      # Only needed for platform deployment

        inv_traefik:
          enable: true
          namespace: traefik-gateway
